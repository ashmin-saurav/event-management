server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:connect_go}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root123
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVN1cGVyU2VjdXJlSnd0S2V5VGhhdE5lZWRzVG9CZUxvbmdFbm91Z2hGb3JIUzI1Ng==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  seed-admin:
    email: ${ADMIN_EMAIL:admin@connectgo.dev}
    password: ${ADMIN_PASSWORD:Admin@123}
    full-name: ${ADMIN_FULL_NAME:Platform Admin}

springdoc:
  swagger-ui:
    path: /swagger-ui.html