version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: connect-go-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: connect_go
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: connect-go-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: connect_go
      DB_USERNAME: root
      DB_PASSWORD: root
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: VGhpc0lzQVN1cGVyU2VjdXJlSnd0S2V5VGhhdE5lZWRzVG9CZUxvbmdFbm91Z2hGb3JIUzI1Ng==
      ADMIN_EMAIL: admin@connectgo.dev
      ADMIN_PASSWORD: Admin@123
      ADMIN_FULL_NAME: Platform Admin
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: connect-go-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data: